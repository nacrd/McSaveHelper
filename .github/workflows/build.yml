name: Build & Release

on:
  push:
    tags:
      - '[0-9]*'
      - 'auto'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则基于最新版本自动+1)'
        required: false
        default: ''

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2025 
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      create_release: ${{ steps.version.outputs.create_release }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Generate version
      id: version
      shell: pwsh
      run: |
        function Get-NextVersion {
          param([string]$LatestTag)
          $parts = $LatestTag.Split('.')
          if ($parts.Count -lt 3) { return "0.0.1" }
          $parts[2] = [int]$parts[2] + 1
          return $($parts -join '.')
        }

        $ref = "${{ github.ref }}"
        $tagName = $ref -replace 'refs/tags/', ''
        $githubEventName = "${{ github.event_name }}"
        $inputVersion = "${{ github.event.inputs.version }}"

        $tags = git tag --list | Where-Object { $_ -match '^v?\d+\.\d+\.\d+$' } | Sort-Object { [version]($_ -replace '^v', '') }

        if ($tagName -eq "auto" -or $githubEventName -eq "workflow_dispatch") {
          if ($inputVersion -match '^\d+\.\d+\.\d+$') {
            $nextTag = $inputVersion
          } elseif ($tags) {
            $latestTag = $tags[-1] -replace '^v', ''
            $nextTag = Get-NextVersion $latestTag
          } else {
            $nextTag = "0.0.1"
          }
          Write-Host "最终生成的版本号: $nextTag"
          Write-Output "tag=$nextTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          Write-Output "create_release=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } elseif ($tagName -match '^v?\d+\.\d+\.\d+$') {
          $pureTag = $tagName -replace '^v', ''
          Write-Output "tag=$pureTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          Write-Output "create_release=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }

    - name: Inject version into core/version.py
      shell: pwsh
      run: |
        $tag = "${{ steps.version.outputs.tag }}"
        if (-not $tag) { $tag = "dev" }
        Set-Content -Path core/version.py -Value "APP_VERSION = `"$tag`"" -Encoding utf8
        Write-Host "core/version.py -> APP_VERSION = $tag"

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        architecture: "x64"
        cache: 'pip'

    - name: Cache Nuitka
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\Nuitka
        key: ${{ runner.os }}-nuitka-${{ hashFiles('requirements.txt', 'build_nuitka.py') }}
        restore-keys: |
          ${{ runner.os }}-nuitka-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 nuitka ordered-set pytest ziglang zstandard
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests
      run: pytest -q tests/

    - name: Build portable version (directory mode)
      run: python build_nuitka.py portable

    - name: Build onefile version
      run: python build_nuitka.py onefile

    - name: Create portable package
      run: 7z a -tzip MCSaveHelper-Windows-portable.zip ./dist/MCSaveHelper

    - name: Rename onefile exe with version
      shell: pwsh
      run: |
        $tag = "${{ steps.version.outputs.tag }}"
        if (-not $tag) { $tag = "dev" }
        Copy-Item dist/MCSaveHelper.exe "MCSaveHelper-${tag}-Windows.exe"

    - name: Upload portable artifact
      uses: actions/upload-artifact@v4
      with:
        name: MCSaveHelper-Windows-portable
        path: MCSaveHelper-Windows-portable.zip
        retention-days: 7

    - name: Upload onefile artifact
      uses: actions/upload-artifact@v4
      with:
        name: MCSaveHelper-Windows-onefile
        path: MCSaveHelper-*-Windows.exe
        retention-days: 7

  release:
    needs: build
    if: needs.build.outputs.create_release == 'true'
    runs-on: ubuntu-latest 
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Delete auto tag
      if: github.ref == 'refs/tags/auto'
      run: git push origin --delete auto || true

    - name: Download portable artifact
      uses: actions/download-artifact@v4
      with:
        name: MCSaveHelper-Windows-portable

    - name: Download onefile artifact
      uses: actions/download-artifact@v4
      with:
        name: MCSaveHelper-Windows-onefile

    - name: Create GitHub Release (auto tag / dispatch)
      if: github.ref == 'refs/tags/auto' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build.outputs.tag }}
        files: |
          MCSaveHelper-*-Windows.exe
          MCSaveHelper-Windows-portable.zip
        generate_release_notes: true

    - name: Create GitHub Release (manual tag)
      if: startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/tags/auto'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          MCSaveHelper-*-Windows.exe
          MCSaveHelper-Windows-portable.zip
        generate_release_notes: true
