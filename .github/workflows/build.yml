name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest          # 改为 Windows

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5   # 升级到 v5 以获得缓存支持
      with:
        python-version: "3.10"
        cache: 'pip'                  # 自动缓存 pip 依赖

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pyinstaller   # 添加 pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    # 可选：如果 setup.bat 需要额外安装（如注册 COM 组件等）
    # - name: Run setup.bat
    #   run: .\setup.bat

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Build with PyInstaller
      run: |
        # 使用你的 .spec 文件打包
        pyinstaller build.spec --noconfirm
        # 如果 .spec 不存在，可以手动指定参数：
        # pyinstaller --onefile --windowed main.py

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: mc_migrator_windows
        path: dist/          # PyInstaller 默认输出目录
