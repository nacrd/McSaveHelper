name: Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14.3
      uses: actions/setup-python@v5
      with:
        python-version: "3.14.3"
        architecture: "x64"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Build with PyInstaller
      run: pyinstaller build.spec --noconfirm

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcsavehelper_windows
        path: dist/
        retention-days: 30

    - name: Create release package
      run: |
        Compress-Archive -Path dist/MCSaveHelper -DestinationPath MCSaveHelper-Windows.zip

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: MCSaveHelper-Windows.zip
        generate_release_notes: true