name: Build & Release

on:
  push:
    branches: ["main"]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'auto'
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (支持 x.y 或 x.y.z，留空则基于最新版本自动+1)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: >-
    ${{ github.event_name == 'pull_request' ||
    (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')) }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.13'

jobs:
  quality:
    name: Quality checks
    runs-on: windows-2025
    timeout-minutes: 20
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      create_release: ${{ steps.version.outputs.create_release }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version
      id: version
      shell: pwsh
      env:
        INPUT_VERSION: ${{ github.event.inputs.version }}
      run: |
        function Get-NextVersion {
          param([string]$LatestTag)
          $parts = $LatestTag.Split('.')
          $parts[2] = [int]$parts[2] + 1
          return $($parts -join '.')
        }

        $ref = $env:GITHUB_REF
        $tagName = $ref -replace '^refs/tags/', ''
        $githubEventName = $env:GITHUB_EVENT_NAME
        $inputVersion = ([string]$env:INPUT_VERSION).Trim()
        $tags = git tag --list |
          Where-Object { $_ -match '^v?\d+\.\d+\.\d+$' } |
          Sort-Object { [version]($_ -replace '^v', '') }

        if ($tagName -eq 'auto' -or $githubEventName -eq 'workflow_dispatch') {
          if ($inputVersion -match '^\d+\.\d+$') {
            $nextTag = "$inputVersion.0"
          } elseif ($inputVersion -match '^\d+\.\d+\.\d+$') {
            $nextTag = $inputVersion
          } elseif ($inputVersion) {
            throw "版本号必须使用 x.y 或 x.y.z 格式，当前输入: $inputVersion"
          } elseif ($tags) {
            $latestTag = $tags[-1] -replace '^v', ''
            $nextTag = Get-NextVersion $latestTag
          } else {
            $nextTag = '0.0.1'
          }
        } elseif ($tagName -match '^v?\d+\.\d+\.\d+$') {
          $nextTag = $tagName -replace '^v', ''
        } elseif ($githubEventName -eq 'push' -and $ref.StartsWith('refs/tags/')) {
          throw "发布标签必须使用 x.y.z 或 vx.y.z 格式，当前标签: $tagName"
        } else {
          Write-Host '当前事件只执行质量检查，不创建发布版本。'
          exit 0
        }

        Write-Host "最终生成的版本号: $nextTag"
        "tag=$nextTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
        "create_release=true" |
          Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        architecture: x64
        cache: pip

    - name: Install test dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        python -m pip install -r requirements.txt

    - name: Check Python errors with flake8
      run: >-
        flake8 app core tests build_nuitka.py main.py
        --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Compile Python sources
      run: python -m compileall -q app core tests build_nuitka.py main.py

    - name: Run tests
      run: python -m pytest -q tests

  build:
    name: Build ${{ matrix.mode }}
    needs: quality
    if: needs.quality.outputs.create_release == 'true'
    runs-on: windows-2025
    timeout-minutes: 90
    strategy:
      fail-fast: true
      matrix:
        include:
          - mode: portable
            artifact_name: MCSaveHelper-Windows-portable
            artifact_path: MCSaveHelper-Windows-portable.zip
          - mode: onefile
            artifact_name: MCSaveHelper-Windows-onefile
            artifact_path: MCSaveHelper-*-Windows.exe

    steps:
    - uses: actions/checkout@v4

    - name: Inject version into core/version.py
      shell: pwsh
      env:
        RELEASE_VERSION: ${{ needs.quality.outputs.tag }}
      run: |
        if (-not $env:RELEASE_VERSION) {
          throw '发布构建缺少版本号'
        }
        $content = "APP_VERSION = `"$env:RELEASE_VERSION`""
        Set-Content -Path core/version.py -Value $content -Encoding utf8
        Write-Host "core/version.py -> APP_VERSION = $env:RELEASE_VERSION"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        architecture: x64
        cache: pip

    - name: Cache Nuitka
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\Nuitka
        key: >-
          ${{ runner.os }}-nuitka-${{ matrix.mode }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-nuitka-${{ matrix.mode }}-
          ${{ runner.os }}-nuitka-

    - name: Install build dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        python -m pip install nuitka ordered-set ziglang zstandard
        python -m pip install -r requirements.txt

    - name: Build ${{ matrix.mode }} version
      run: python build_nuitka.py ${{ matrix.mode }}

    - name: Create portable package
      if: matrix.mode == 'portable'
      run: 7z a -tzip MCSaveHelper-Windows-portable.zip ./dist/MCSaveHelper

    - name: Rename onefile executable
      if: matrix.mode == 'onefile'
      shell: pwsh
      env:
        RELEASE_VERSION: ${{ needs.quality.outputs.tag }}
      run: >-
        Copy-Item dist/MCSaveHelper.exe
        "MCSaveHelper-$($env:RELEASE_VERSION)-Windows.exe"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_path }}
        if-no-files-found: error
        retention-days: 7

  release:
    name: Create release
    needs: [quality, build]
    if: needs.quality.outputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Delete auto tag
      if: github.ref == 'refs/tags/auto'
      run: git push origin --delete auto || true

    - name: Download portable artifact
      uses: actions/download-artifact@v4
      with:
        name: MCSaveHelper-Windows-portable

    - name: Download onefile artifact
      uses: actions/download-artifact@v4
      with:
        name: MCSaveHelper-Windows-onefile

    - name: Create GitHub Release (auto tag / dispatch)
      if: github.ref == 'refs/tags/auto' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.quality.outputs.tag }}
        files: |
          MCSaveHelper-*-Windows.exe
          MCSaveHelper-Windows-portable.zip
        generate_release_notes: true

    - name: Create GitHub Release (manual tag)
      if: startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/tags/auto'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          MCSaveHelper-*-Windows.exe
          MCSaveHelper-Windows-portable.zip
        generate_release_notes: true
