[tool.mypy]
python_version = "3.14"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "flet.*",
    "requests.*"
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "app.application",
    "app.services.config_service",
    "app.services.i18n_service",
    "app.services.item_service",
    "app.ui.*",
    "core.converter",
    "core.full_mode",
    "core.i18n",
    "core.nbt_utils",
    "core.omni.*",
    "core.pure_cleaner",
    "core.types",
    "core.utils",
    "core.uuid_utils",
    "core.worker",
    "tests.*"
]
ignore_errors = true
